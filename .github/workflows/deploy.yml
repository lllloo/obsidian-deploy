name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'quartz/**'
      - 'quartz.config.ts'
      - 'quartz.layout.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout obsidian-memory (vault)
        uses: actions/checkout@v4
        with:
          repository: lllloo/obsidian-memory
          path: content
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Vault check (frontmatter + sensitive data)
        run: npm run vault:check
      - name: Build
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        if: needs.build.result == 'success'
        uses: actions/deploy-pages@v4

      - name: Discord 打包失敗通知
        if: needs.build.result != 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: failure
          title: '❌ Vault 打包失敗'
          description: 'Obsidian Memory 打包失敗（vault:check 或 build）'

      - name: Discord 部署通知
        if: needs.build.result == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: ${{ job.status == 'success' && '✅ Vault 部署成功' || '❌ Vault 部署失敗' }}
          description: ${{ job.status == 'success' && 'ob.bugloop.com 已更新' || 'GitHub Pages 部署失敗' }}
